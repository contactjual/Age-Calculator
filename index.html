<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(#3C193F, #9C2F67);
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      max-width: 500px;
    }

    h2 {
      text-align: center;
      font-size: 30px;
      ;
      color: white;
    }

    label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #712555;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #712555;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #712555;
    }

    .result {
      margin-top: 25px;
      background: #f9fbff;
      border-left: 5px solid #712555;
      padding: 15px;
      border-radius: 6px;
    }

    .result p {
      margin-bottom: 8px;
      font-size: 15px;
      color: #444;
    }

    .highlight {
      font-weight: bold;
      color: #712555;
    }

    /* ------------ marquee ---------------- */

    .marquee_container_by_jual {
      position: relative;
      top: -500px;
      white-space: nowrap;
      transform: rotate(90deg);
      width: 20px;
    }

    .marquee_content_by_jual {
      display: inline-block;
      color: white;
      font-size: 25px;
      padding: 20px 0;
      animation: marquee 60s linear infinite;
    }

    /* Keyframes for endless loop */
    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body>
  <div class="marquee_container_by_jual">
    <div class="marquee_content_by_jual">
      <pre>Age Calculator       Age Calculator       Age Calculator       Age Calculator       Age Calculator       Age Calculator       Age Calculator       Age Calculator       Age Calculator       Age Calculator</pre> 
    </div>
  </div>
  <div class="container">
    <label for="birthDate">Birth Date:</label>
    <input type="date" id="birthDate">

    <label for="currentDate">Current Date:</label>
    <input type="date" id="currentDate">

    <button onclick="calculateAge()">Calculate</button>

    <div class="result" id="result"></div>
  </div>

  <script src="index.js"></script>

</body>

</html>
